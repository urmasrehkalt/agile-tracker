<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Agiilne Tracker</title>
    <link rel="stylesheet" href="/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script defer src="/app.js"></script>
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <span class="eyebrow">Kanban töölaud</span>
            <h1>Agiilne Tracker</h1>
        </div>
        <div class="toolbar">
            <label class="visually-hidden" for="search">Otsi story pealkirja järgi</label>
            <input id="search" class="search" type="search" placeholder="Otsi pealkirja järgi…">
            <label class="visually-hidden" for="filter-points">Filtreeri punktide järgi</label>
            <select id="filter-points" class="filter">
                <option value="">Kõik punktid</option>
                <option value="1">≥ 1</option>
                <option value="3">≥ 3</option>
                <option value="5">≥ 5</option>
                <option value="8">≥ 8</option>
            </select>
            <button id="theme-toggle" class="btn btn-ghost theme-toggle" type="button" aria-pressed="false">Tume</button>
            <button id="add-story" class="btn btn-primary">+ Uus story</button>
        </div>
    </header>

    <div id="app-status" class="app-status" role="status" aria-live="polite" hidden></div>

    <main class="board">
        <section class="column" data-status="todo">
            <header class="column-header">
                <div>
                    <h2>Todo / Backlog</h2>
                    <p>Planeeritud töö</p>
                </div>
                <div class="column-stats">
                    <span class="story-count" data-count-for="todo">0 story</span>
                    <span class="points-sum" data-sum-for="todo">0p</span>
                </div>
            </header>
            <div class="cards" id="col-todo"></div>
        </section>

        <section class="column" data-status="doing">
            <header class="column-header">
                <div>
                    <h2>Doing</h2>
                    <p>Töös olevad story'd</p>
                </div>
                <div class="column-stats">
                    <span class="story-count" data-count-for="doing">0 story</span>
                    <span class="points-sum" data-sum-for="doing">0p</span>
                </div>
            </header>
            <div class="cards" id="col-doing"></div>
        </section>

        <section class="column" data-status="done">
            <header class="column-header">
                <div>
                    <h2>Done</h2>
                    <p>Valmis ja kontrollitud</p>
                </div>
                <div class="column-stats">
                    <span class="story-count" data-count-for="done">0 story</span>
                    <span class="points-sum" data-sum-for="done">0p</span>
                </div>
            </header>
            <div class="cards" id="col-done"></div>
        </section>
    </main>

    <div id="detail-root" class="modal-root" hidden>
        <div class="modal-backdrop" data-close></div>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="detail-title">
            <header class="modal-header">
                <h2 id="detail-title">Story</h2>
                <button class="modal-close btn" data-close aria-label="Sulge">✕</button>
            </header>
            <div class="modal-body" id="detail-body"></div>
            <footer class="modal-footer">
                <button class="btn btn-danger" id="detail-delete">Kustuta</button>
                <button class="btn btn-primary" id="detail-edit">Muuda</button>
            </footer>
        </div>
    </div>

    <div id="modal-root" class="modal-root" hidden>
        <div class="modal-backdrop" data-close></div>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <header class="modal-header">
                <h2 id="modal-title">Uus story</h2>
                <button class="modal-close btn" data-close aria-label="Sulge">✕</button>
            </header>
            <form id="story-form">
                <div class="modal-body">
                    <label class="field">
                        <span>Pealkiri *</span>
                        <input name="title" required maxlength="200">
                    </label>
                    <label class="field">
                        <span>Kirjeldus</span>
                        <textarea name="description" rows="3"></textarea>
                    </label>
                    <div class="row">
                        <label class="field">
                            <span>Punktid *</span>
                            <input name="points" type="number" min="0" step="1" required>
                        </label>
                        <div class="field">
                            <label id="status-label" for="story-status">Staatus</label>
                            <select id="story-status" class="native-select" name="status" tabindex="-1" aria-hidden="true">
                                <option value="todo">Todo / Backlog</option>
                                <option value="doing">Doing</option>
                                <option value="done">Done</option>
                            </select>
                            <div class="custom-select" data-status-select>
                                <button class="custom-select-trigger" id="status-trigger" type="button" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="status-label status-trigger-value">
                                    <span id="status-trigger-value">Todo / Backlog</span>
                                </button>
                                <div class="custom-select-menu" role="listbox" aria-labelledby="status-label" hidden>
                                    <button type="button" class="custom-select-option" role="option" data-value="todo" aria-selected="true">Todo / Backlog</button>
                                    <button type="button" class="custom-select-option" role="option" data-value="doing" aria-selected="false">Doing</button>
                                    <button type="button" class="custom-select-option" role="option" data-value="done" aria-selected="false">Done</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <fieldset class="field">
                        <legend>Vastuvõtutingimused * (vähemalt 1)</legend>
                        <div id="criteria-list"></div>
                        <button type="button" class="btn" id="add-criterion">+ Lisa tingimus</button>
                    </fieldset>
                    <p id="form-error" class="form-error" hidden></p>
                </div>
                <footer class="modal-footer">
                    <button type="button" class="btn" data-close>Tühista</button>
                    <button type="submit" class="btn btn-primary">Salvesta</button>
                </footer>
            </form>
        </div>
    </div>

    <div id="mockup-viewer-root" class="modal-root mockup-viewer-root" hidden>
        <div class="modal-backdrop" data-close></div>
        <div class="mockup-viewer" role="dialog" aria-modal="true" aria-labelledby="mockup-viewer-title">
            <header class="modal-header">
                <h2 id="mockup-viewer-title">Mockup</h2>
                <button class="modal-close btn" data-close aria-label="Sulge">✕</button>
            </header>
            <div class="mockup-viewer-body">
                <img id="mockup-viewer-image" class="mockup-viewer-image" alt="">
                <p id="mockup-viewer-caption" class="comment-meta"></p>
            </div>
        </div>
    </div>
</body>
</html>
