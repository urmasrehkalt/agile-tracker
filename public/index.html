<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agiilne Tracker</title>
    <link rel="stylesheet" href="/style.css">
    <script defer src="/app.js"></script>
</head>
<body>
    <header class="topbar">
        <h1>Agiilne Tracker</h1>
        <div class="toolbar">
            <input id="search" class="search" type="search" placeholder="Otsi pealkirja järgi…" disabled>
            <select id="filter-points" class="filter" disabled>
                <option value="">Kõik punktid</option>
                <option value="1">≥ 1</option>
                <option value="3">≥ 3</option>
                <option value="5">≥ 5</option>
                <option value="8">≥ 8</option>
            </select>
            <button id="add-story" class="btn btn-primary">+ Uus story</button>
        </div>
    </header>

    <main class="board">
        <section class="column" data-status="todo">
            <header class="column-header">
                <h2>Todo / Backlog</h2>
                <span class="points-sum" data-sum-for="todo">0p</span>
            </header>
            <div class="cards" id="col-todo"></div>
        </section>

        <section class="column" data-status="doing">
            <header class="column-header">
                <h2>Doing</h2>
                <span class="points-sum" data-sum-for="doing">0p</span>
            </header>
            <div class="cards" id="col-doing"></div>
        </section>

        <section class="column" data-status="done">
            <header class="column-header">
                <h2>Done</h2>
                <span class="points-sum" data-sum-for="done">0p</span>
            </header>
            <div class="cards" id="col-done"></div>
        </section>
    </main>

    <div id="modal-root" class="modal-root" hidden>
        <div class="modal-backdrop" data-close></div>
        <div class="modal" role="dialog" aria-modal="true">
            <header class="modal-header">
                <h2 id="modal-title">Uus story</h2>
                <button class="modal-close btn" data-close aria-label="Sulge">✕</button>
            </header>
            <form id="story-form" class="modal-body">
                <label class="field">
                    <span>Pealkiri *</span>
                    <input name="title" required maxlength="200">
                </label>
                <label class="field">
                    <span>Kirjeldus</span>
                    <textarea name="description" rows="3"></textarea>
                </label>
                <div class="row">
                    <label class="field">
                        <span>Punktid *</span>
                        <input name="points" type="number" min="0" step="1" required>
                    </label>
                    <label class="field">
                        <span>Staatus</span>
                        <select name="status">
                            <option value="todo">Todo / Backlog</option>
                            <option value="doing">Doing</option>
                            <option value="done">Done</option>
                        </select>
                    </label>
                </div>
                <fieldset class="field">
                    <legend>Vastuvõtutingimused * (vähemalt 1)</legend>
                    <div id="criteria-list"></div>
                    <button type="button" class="btn" id="add-criterion">+ Lisa tingimus</button>
                </fieldset>
                <p id="form-error" class="form-error" hidden></p>
                <footer class="modal-footer">
                    <button type="button" class="btn" data-close>Tühista</button>
                    <button type="submit" class="btn btn-primary">Salvesta</button>
                </footer>
            </form>
        </div>
    </div>
</body>
</html>
